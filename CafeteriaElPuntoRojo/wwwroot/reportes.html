<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./Assets/logo.png">
    <title>Reportes - El Punto Rojo</title>
    <style>
        .reportes-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            background: #D32F2F;
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header a {
            color: white;
            text-decoration: none;
            background: rgba(255,255,255,0.2);
            padding: 8px 15px;
            border-radius: 5px;
        }
        .filtros {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .filtros h3 {
            color: #333;
            margin-bottom: 15px;
        }
        .filtros input, .filtros button {
            padding: 10px;
            margin: 5px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .filtros button {
            background: #D32F2F;
            color: white;
            border: none;
            cursor: pointer;
            transition: background 0.3s;
        }
        .filtros button:hover {
            background: #B71C1C;
        }
        .reporte-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .reporte-card h3 {
            color: #D32F2F;
            margin-bottom: 15px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th {
            background: #f5f5f5;
            padding: 10px;
            text-align: left;
            border-bottom: 2px solid #ddd;
        }
        td {
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
        .total-resumen {
            background: #e8f5e9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .total-resumen p {
            margin: 5px 0;
            font-size: 1.1em;
        }
        .btn-imprimir {
            background: #4CAF50;
            margin-top: 10px;
        }
        .btn-imprimir:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
    <div class="reportes-container">
        <div class="header">
            <h1><img src="./Assets/logo.png" width="35px" alt=""> El Punto Rojo - Reportes</h1>
            <a href="index.html">← Volver a Ventas</a>
        </div>
        
        <!-- Reporte de Ventas Diarias -->
        <div class="filtros">
            <h3>📅 Reporte de Ventas Diarias</h3>
            <div>
                <label>Fecha: </label>
                <input type="date" id="fechaReporte" value="2026-04-21">
                <button onclick="generarReporteDiario()">🔍 Generar Reporte</button>
                <button onclick="imprimirReporte()" class="btn-imprimir">🖨️ Imprimir Reporte</button>
            </div>
        </div>
        
        <div id="reporteDiario" class="reporte-card">
            <p style="color: #666;">Seleccione una fecha y haga clic en "Generar Reporte"</p>
        </div>
        
        <!-- Reporte de Inventario Bajo -->
        <div class="filtros">
            <h3>⚠️ Productos con Stock Bajo</h3>
            <button onclick="generarReporteInventarioBajo()">📦 Ver Productos con Stock Bajo</button>
        </div>
        
        <div id="reporteInventario" class="reporte-card">
            <p style="color: #666;">Haga clic en "Ver Productos con Stock Bajo"</p>
        </div>
        
        <!-- Estadísticas Totales -->
        <div class="filtros">
            <h3>📈 Estadísticas Generales</h3>
            <button onclick="generarEstadisticas()">📊 Ver Estadísticas</button>
        </div>
        
        <div id="estadisticas" class="reporte-card">
            <p style="color: #666;">Haga clic en "Ver Estadísticas"</p>
        </div>
    </div>

    <script>
        async function generarReporteDiario() {
            const fecha = document.getElementById('fechaReporte').value;
            if (!fecha) {
                alert('Por favor seleccione una fecha');
                return;
            }
            
            mostrarCargando('reporteDiario');
            
            try {
                const response = await fetch(`/api/reportes/ventas-diarias?fecha=${fecha}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error);
                }
                
                const html = `
                    <h3>📋 Reporte del ${data.fecha}</h3>
                    <div class="total-resumen">
                        <p><strong>📊 Total de ventas:</strong> ${data.totalVentas} venta(s)</p>
                        <p><strong>💰 Ingresos totales:</strong> $${data.totalIngresos.toFixed(2)}</p>
                    </div>
                    
                    <h4>🛒 Productos vendidos:</h4>
                    ${data.productosVendidos.length > 0 ? `
                        <table>
                            <thead>
                                <tr>
                                    <th>Producto</th>
                                    <th>Cantidad</th>
                                    <th>Total</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${data.productosVendidos.map(p => `
                                    <tr>
                                        <td>${p.producto}</td>
                                        <td>${p.cantidad} unidad(es)</td>
                                        <td>$${p.total.toFixed(2)}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    ` : '<p style="color: #999;">No hubo ventas en esta fecha</p>'}
                `;
                
                document.getElementById('reporteDiario').innerHTML = html;
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('reporteDiario').innerHTML = `
                    <div style="color: red; padding: 20px; text-align: center;">
                        ❌ Error al cargar el reporte<br>
                        <small>${error.message}</small><br>
                        <button onclick="generarReporteDiario()" style="margin-top: 10px;">Reintentar</button>
                    </div>
                `;
            }
        }
        
        async function generarReporteInventarioBajo() {
            mostrarCargando('reporteInventario');
            
            try {
                const response = await fetch('/api/reportes/inventario-bajo?limite=5');
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const productos = await response.json();
                
                if (productos.error) {
                    throw new Error(productos.error);
                }
                
                const html = `
                    <h3>⚠️ Productos con Stock Bajo (menos de 5 unidades)</h3>
                    ${productos.length > 0 ? `
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Producto</th>
                                    <th>Categoría</th>
                                    <th>Stock Actual</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${productos.map(p => `
                                    <tr style="${p.stock === 0 ? 'background: #ffebee;' : 'background: #fff3e0;'}">
                                        <td>${p.id}</td>
                                        <td><strong>${p.nombre}</strong></td>
                                        <td>${p.categoriaNombre}</td>
                                        <td style="color: ${p.stock === 0 ? 'red' : 'orange'}; font-weight: bold;">
                                            ${p.stock} unidad(es)
                                            ${p.stock === 0 ? ' (¡AGOTADO!)' : ''}
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                        <div class="total-resumen" style="background: #fff3e0; margin-top: 15px;">
                            <p><strong>⚠️ Total de productos con stock bajo:</strong> ${productos.length}</p>
                            <p><strong>🔴 Productos agotados:</strong> ${productos.filter(p => p.stock === 0).length}</p>
                        </div>
                    ` : '<p style="color: #4CAF50;">✅ No hay productos con stock bajo. ¡Inventario saludable!</p>'}
                `;
                
                document.getElementById('reporteInventario').innerHTML = html;
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('reporteInventario').innerHTML = `
                    <div style="color: red; padding: 20px; text-align: center;">
                        ❌ Error al cargar el inventario<br>
                        <small>${error.message}</small>
                    </div>
                `;
            }
        }
        
        async function generarEstadisticas() {
            mostrarCargando('estadisticas');
            
            try {
                const response = await fetch('/api/reportes/ventas-totales');
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error);
                }
                
                const html = `
                    <h3>📈 Estadísticas Generales</h3>
                    <div class="total-resumen">
                        <p><strong>📊 Total de ventas registradas:</strong> ${data.totalVentas}</p>
                        <p><strong>💰 Ingresos totales acumulados:</strong> $${data.totalIngresos.toFixed(2)}</p>
                        <p><strong>⭐ Ticket promedio:</strong> $${data.totalVentas > 0 ? (data.totalIngresos / data.totalVentas).toFixed(2) : '0.00'}</p>
                    </div>
                `;
                
                document.getElementById('estadisticas').innerHTML = html;
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('estadisticas').innerHTML = `
                    <div style="color: red; padding: 20px; text-align: center;">
                        ❌ Error al cargar estadísticas<br>
                        <small>${error.message}</small>
                    </div>
                `;
            }
        }
        
        function mostrarCargando(elementoId) {
            document.getElementById(elementoId).innerHTML = `
                <div style="text-align: center; padding: 40px;">
                    <div>Cargando...</div>
                </div>
            `;
        }
        
        function imprimirReporte() {
            const reporteContent = document.getElementById('reporteDiario').innerHTML;
            const ventana = window.open('', '_blank');
            ventana.document.write(`
                <html>
                <head>
                    <title>Reporte - El Punto Rojo</title>
                    <style>
                        body { font-family: Arial, sans-serif; padding: 20px; }
                        h1 { color: #D32F2F; }
                        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
                        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
                        th { background: #f5f5f5; }
                        .total-resumen { background: #f5f5f5; padding: 10px; margin: 20px 0; }
                        @media print {
                            button { display: none; }
                        }
                    </style>
                </head>
                <body>
                    <h1>☕ Cafetería El Punto Rojo</h1>
                    ${reporteContent}
                    <p style="margin-top: 30px; text-align: center; color: #999;">
                        Reporte generado el ${new Date().toLocaleString()}
                    </p>
                    <script>
                        window.print();
                        setTimeout(() => window.close(), 1000);
                    <\/script>
                </body>
                </html>
            `);
            ventana.document.close();
        }
        
        // Cargar reporte del día actual automáticamente
        document.addEventListener('DOMContentLoaded', () => {
            // Establecer fecha actual por defecto
            const hoy = new Date().toISOString().split('T')[0];
            document.getElementById('fechaReporte').value = hoy;
            // Cargar reporte automáticamente
            generarReporteDiario();
            generarReporteInventarioBajo();
        });
    </script>
</body>
</html>
